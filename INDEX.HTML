<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#10b981">
<title>Finanças Pessoais</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --green: #10b981;
    --green-light: #d1fae5;
    --green-dim: #064e3b;
    --red: #f43f5e;
    --red-light: #ffe4e6;
    --red-dim: #4c0519;
    --amber: #f59e0b;
    --blue: #3b82f6;
    --purple: #8b5cf6;
    --bg: #0d1117;
    --bg2: #161b27;
    --bg3: #1e2638;
    --border: rgba(255,255,255,0.08);
    --text: #f1f5f9;
    --text2: #94a3b8;
    --text3: #475569;
    --radius: 16px;
    --radius-sm: 10px;
  }

  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', system-ui, sans-serif; font-size: 15px; }

  .app { display: flex; flex-direction: column; height: 100dvh; height: 100vh; }

  /* HEADER */
  .header { padding: 16px 20px 12px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header-title { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, #10b981, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .header-month { font-size: 13px; color: var(--text2); font-weight: 500; }

  /* SCROLL AREA */
  .scroll { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 0 16px 100px; }

  /* CHART CARD */
  .chart-card { background: var(--bg2); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); }
  .chart-wrap { display: flex; align-items: center; gap: 16px; }
  .donut-wrap { position: relative; width: 140px; height: 140px; flex-shrink: 0; }
  .donut-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
  .donut-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
  .donut-val { font-size: 18px; font-weight: 800; margin-top: 1px; }
  .chart-stats { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .chart-stat { display: flex; flex-direction: column; gap: 3px; }
  .chart-stat-label { font-size: 11px; color: var(--text2); font-weight: 600; display: flex; align-items: center; gap: 5px; }
  .chart-stat-dot { width: 8px; height: 8px; border-radius: 3px; }
  .chart-stat-val { font-size: 20px; font-weight: 800; }
  .chart-stat-bar { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin-top: 3px; }
  .chart-stat-fill { height: 100%; border-radius: 3px; transition: width .4s cubic-bezier(.4,0,.2,1); }

  /* SECTION */
  .section { margin-bottom: 16px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; display: flex; align-items: center; gap: 7px; }
  .section-badge { font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
  .section-card { background: var(--bg2); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }

  /* ROW */
  .row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 1px solid var(--border); position: relative; }
  .row:last-child { border-bottom: none; }
  .row-toggle { width: 30px; height: 30px; border-radius: 9px; border: 1.5px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .18s; -webkit-appearance: none; }
  .row-toggle.on-i { background: var(--green-dim); border-color: var(--green); }
  .row-toggle.on-e { background: var(--red-dim); border-color: var(--red); }
  .row-toggle .ti { font-size: 15px; }
  .row-name { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); background: transparent; border: none; outline: none; min-width: 0; -webkit-appearance: none; padding: 4px 0; }
  .row-name::placeholder { color: var(--text3); }
  .row-name.dim { opacity: 0.4; }
  .row-val { width: 100px; text-align: right; font-size: 14px; font-weight: 700; color: var(--text); background: var(--bg3); border: 1.5px solid transparent; border-radius: var(--radius-sm); padding: 6px 10px; outline: none; -webkit-appearance: none; transition: border-color .15s; }
  .row-val:focus { border-color: rgba(255,255,255,0.2); }
  .row-val::placeholder { color: var(--text3); font-weight: 400; }
  .row-del { width: 28px; height: 28px; border: none; background: transparent; cursor: pointer; color: var(--text3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; border-radius: 7px; transition: color .15s, background .15s; padding: 0; -webkit-appearance: none; }
  .row-del:active { color: var(--red); background: var(--red-dim); }

  /* ADD BUTTON */
  .add-row { display: flex; align-items: center; gap: 8px; padding: 12px 14px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text2); background: none; border: none; width: 100%; -webkit-appearance: none; }
  .add-row:active { background: var(--bg3); }
  .add-row .add-icon { width: 26px; height: 26px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }

  /* BOTTOM NAV */
  .bottom-nav { display: none; }

  /* TOAST */
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1e293b; color: var(--text); padding: 10px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; opacity: 0; transition: all .25s; pointer-events: none; white-space: nowrap; border: 1px solid var(--border); z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* INSTALL BANNER */
  .install-banner { margin: 0 0 16px; padding: 14px 16px; background: linear-gradient(135deg, #064e3b, #1e3a5f); border-radius: var(--radius); border: 1px solid rgba(16,185,129,0.3); display: flex; align-items: center; gap: 12px; }
  .install-banner-text { flex: 1; font-size: 13px; color: #a7f3d0; font-weight: 500; line-height: 1.4; }
  .install-banner-btn { padding: 8px 14px; background: var(--green); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; -webkit-appearance: none; flex-shrink: 0; }
  .install-banner-close { color: #6ee7b7; background: none; border: none; cursor: pointer; font-size: 18px; display: flex; padding: 0; -webkit-appearance: none; flex-shrink: 0; }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f8fafc; --bg2: #ffffff; --bg3: #f1f5f9;
      --border: rgba(0,0,0,0.08); --text: #0f172a; --text2: #64748b; --text3: #94a3b8;
      --green-dim: #d1fae5; --red-dim: #ffe4e6;
    }
    .header-title { background: linear-gradient(135deg, #059669, #2563eb); -webkit-background-clip: text; background-clip: text; }
    .row-val { background: #f1f5f9; }
    .install-banner { background: linear-gradient(135deg, #ecfdf5, #eff6ff); border-color: rgba(16,185,129,0.4); }
    .install-banner-text { color: #065f46; }
    .install-banner-close { color: #10b981; }
    .toast { background: #1e293b; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div>
      <div class="header-title">Finanças Pessoais</div>
      <div class="header-month" id="month-label"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button onclick="exportCSV()" style="background:none;border:none;cursor:pointer;color:var(--text2);padding:6px;border-radius:8px;display:flex" title="Exportar CSV">
        <i class="ti ti-download" style="font-size:20px"></i>
      </button>
    </div>
  </div>

  <div class="scroll" id="scroll">

    <div id="install-banner" class="install-banner" style="display:none">
      <i class="ti ti-device-mobile" style="font-size:22px;color:#6ee7b7;flex-shrink:0"></i>
      <div class="install-banner-text">Instala esta app no teu Android para usar offline!</div>
      <button class="install-banner-btn" id="install-btn">Instalar</button>
      <button class="install-banner-close" onclick="document.getElementById('install-banner').style.display='none'">
        <i class="ti ti-x"></i>
      </button>
    </div>

    <!-- CHART -->
    <div class="chart-card">
      <div class="chart-wrap">
        <div class="donut-wrap">
          <canvas id="donut" role="img" aria-label="Gráfico circular balanço"></canvas>
          <div class="donut-center">
            <span class="donut-label">balanço</span>
            <span class="donut-val" id="bal-val">—</span>
          </div>
        </div>
        <div class="chart-stats">
          <div class="chart-stat">
            <div class="chart-stat-label">
              <span class="chart-stat-dot" style="background:var(--green)"></span>
              Receitas sel.
            </div>
            <div class="chart-stat-val" id="sum-i" style="color:var(--green)">0 €</div>
            <div class="chart-stat-bar"><div class="chart-stat-fill" id="bar-i" style="background:var(--green);width:0%"></div></div>
          </div>
          <div class="chart-stat">
            <div class="chart-stat-label">
              <span class="chart-stat-dot" style="background:var(--red)"></span>
              Despesas sel.
            </div>
            <div class="chart-stat-val" id="sum-e" style="color:var(--red)">0 €</div>
            <div class="chart-stat-bar"><div class="chart-stat-fill" id="bar-e" style="background:var(--red);width:0%"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- RECEITAS -->
    <div class="section">
      <div class="section-header">
        <div class="section-title" style="color:var(--green)">
          <i class="ti ti-arrow-down-circle" style="font-size:18px"></i>
          Receitas
        </div>
        <div class="section-badge" id="badge-i" style="background:var(--green-dim);color:var(--green)">0 €</div>
      </div>
      <div class="section-card">
        <div id="income-list"></div>
        <button class="add-row" onclick="addItem('income')">
          <div class="add-icon" style="background:var(--green-dim);color:var(--green)"><i class="ti ti-plus"></i></div>
          Adicionar receita
        </button>
      </div>
    </div>

    <!-- DESPESAS -->
    <div class="section">
      <div class="section-header">
        <div class="section-title" style="color:var(--red)">
          <i class="ti ti-arrow-up-circle" style="font-size:18px"></i>
          Despesas
        </div>
        <div class="section-badge" id="badge-e" style="background:var(--red-dim);color:var(--red)">0 €</div>
      </div>
      <div class="section-card">
        <div id="expense-list"></div>
        <button class="add-row" onclick="addItem('expense')">
          <div class="add-icon" style="background:var(--red-dim);color:var(--red)"><i class="ti ti-plus"></i></div>
          Adicionar despesa
        </button>
      </div>
    </div>

  </div><!-- /scroll -->
</div><!-- /app -->

<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const DEFAULTS = {
  income: [
    {id:'cgd',     name:'CGD',             val:0,    on:false},
    {id:'salario', name:'Salário',          val:2800, on:true},
    {id:'tania',   name:'Tânia Casa',       val:450,  on:true},
    {id:'maneio',  name:'Fundo Maneio',     val:300,  on:true},
    {id:'emergenc',name:'Fundo Emergência', val:2500, on:true},
    {id:'ppr',     name:'PPR',              val:0,    on:false},
    {id:'etf',     name:'ETF',              val:0,    on:false},
    {id:'offline', name:'Offline / Cash',   val:0,    on:false},
  ],
  expense: [
    {id:'prestacao',name:'Prestação + Seguro',  val:680, on:true},
    {id:'gpl',      name:'GPL / Combustível',   val:95,  on:true},
    {id:'segsocial',name:'Seg. Social',         val:180, on:true},
    {id:'meo',      name:'Meo + Tlm + Bar',     val:65,  on:true},
    {id:'viaverde', name:'Via Verde',            val:28,  on:true},
    {id:'ppr_ref',  name:'PPR (Reforço)',        val:100, on:true},
    {id:'xtb',      name:'XTB',                 val:150, on:true},
    {id:'pensao',   name:'Pensão Alimentos',     val:250, on:true},
    {id:'unibanco', name:'Compras Unibanco',     val:0,   on:false},
    {id:'cetelem',  name:'Compras Cetelem',      val:0,   on:false},
    {id:'compras',  name:'Compras Gerais',       val:142, on:true},
  ]
};

function loadData() {
  try {
    const saved = localStorage.getItem('fp_data');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return { income: DEFAULTS.income.map(r=>({...r})), expense: DEFAULTS.expense.map(r=>({...r})) };
}

function saveData() {
  try { localStorage.setItem('fp_data', JSON.stringify(state)); } catch(e) {}
}

let state = loadData();
let uidc = Date.now();
function uid() { return 's'+(uidc++); }

function fmt(v) {
  return new Intl.NumberFormat('pt-PT',{style:'currency',currency:'EUR',maximumFractionDigits:2}).format(v);
}
function parseVal(s) {
  const n = parseFloat(String(s).replace(',','.').replace(/[^\d.]/g,''));
  return isNaN(n) ? 0 : n;
}

// ── CHART ─────────────────────────────────────────────────────────────────────
const chartCtx = document.getElementById('donut').getContext('2d');
const chart = new Chart(chartCtx, {
  type: 'doughnut',
  data: { labels:[], datasets:[{ data:[], backgroundColor:[], borderWidth:0, hoverBorderWidth:0 }] },
  options: {
    responsive: true, maintainAspectRatio: true, cutout: '72%',
    plugins: { legend:{display:false}, tooltip:{enabled:false} },
    animation: { duration: 300 }
  }
});

function update() {
  const si = state.income.filter(r=>r.on).reduce((a,r)=>a+r.val,0);
  const se = state.expense.filter(r=>r.on).reduce((a,r)=>a+r.val,0);
  const ti = state.income.reduce((a,r)=>a+r.val,0);
  const te = state.expense.reduce((a,r)=>a+r.val,0);
  const bal = si - se;
  const total = si + se;

  document.getElementById('sum-i').textContent = fmt(si);
  document.getElementById('sum-e').textContent = fmt(se);
  document.getElementById('badge-i').textContent = fmt(ti);
  document.getElementById('badge-e').textContent = fmt(te);

  const balEl = document.getElementById('bal-val');
  balEl.textContent = fmt(bal);
  balEl.style.color = bal >= 0 ? 'var(--green)' : 'var(--red)';
  balEl.style.fontSize = Math.abs(bal) >= 10000 ? '13px' : Math.abs(bal) >= 1000 ? '15px' : '18px';

  document.getElementById('bar-i').style.width = total > 0 ? (si/total*100)+'%' : '0%';
  document.getElementById('bar-e').style.width = total > 0 ? (se/total*100)+'%' : '0%';

  const iItems = state.income.filter(r=>r.on && r.val>0);
  const eItems = state.expense.filter(r=>r.on && r.val>0);
  const data   = [...iItems.map(r=>r.val), ...eItems.map(r=>r.val)];
  const labels = [...iItems.map(r=>r.name), ...eItems.map(r=>r.name)];
  const colors = [...iItems.map(()=>'#10b981'), ...eItems.map(()=>'#f43f5e')];

  if (data.length === 0) {
    chart.data.labels=['—']; chart.data.datasets[0].data=[1]; chart.data.datasets[0].backgroundColor=['#334155'];
  } else {
    chart.data.labels=labels; chart.data.datasets[0].data=data; chart.data.datasets[0].backgroundColor=colors;
  }
  chart.update('none');
  saveData();
}

// ── ROWS ──────────────────────────────────────────────────────────────────────
function buildRow(item, kind) {
  const div = document.createElement('div');
  div.className = 'row';
  div.dataset.id = item.id;

  const btn = document.createElement('button');
  btn.className = 'row-toggle' + (item.on ? (kind==='income' ? ' on-i' : ' on-e') : '');
  btn.setAttribute('aria-label', item.on ? 'Desactivar' : 'Activar');
  const tc = kind==='income' ? 'var(--green)' : 'var(--red)';
  btn.innerHTML = item.on ? `<i class="ti ti-check" style="font-size:15px;color:${tc}"></i>` : '';
  btn.addEventListener('click', () => {
    item.on = !item.on;
    btn.className = 'row-toggle' + (item.on ? (kind==='income' ? ' on-i' : ' on-e') : '');
    btn.innerHTML = item.on ? `<i class="ti ti-check" style="font-size:15px;color:${tc}"></i>` : '';
    nameEl.className = 'row-name' + (item.on ? '' : ' dim');
    update();
  });

  const nameEl = document.createElement('input');
  nameEl.type = 'text';
  nameEl.className = 'row-name' + (item.on ? '' : ' dim');
  nameEl.value = item.name;
  nameEl.placeholder = 'Nome';
  nameEl.addEventListener('input', () => { item.name = nameEl.value; update(); });

  const valEl = document.createElement('input');
  valEl.type = 'text';
  valEl.inputMode = 'decimal';
  valEl.className = 'row-val';
  valEl.value = item.val > 0 ? item.val.toFixed(2).replace('.',',') : '';
  valEl.placeholder = '0,00';
  valEl.style.color = kind==='income' ? 'var(--green)' : 'var(--red)';
  valEl.addEventListener('input', () => { item.val = parseVal(valEl.value); update(); });
  valEl.addEventListener('blur', () => { if(item.val>0) valEl.value = item.val.toFixed(2).replace('.',','); });

  const del = document.createElement('button');
  del.className = 'row-del';
  del.setAttribute('aria-label', 'Remover');
  del.innerHTML = '<i class="ti ti-trash" style="font-size:15px"></i>';
  del.addEventListener('click', () => {
    const arr = kind==='income' ? state.income : state.expense;
    const idx = arr.findIndex(r=>r.id===item.id);
    if (idx > -1) arr.splice(idx,1);
    div.remove();
    update();
  });

  div.append(btn, nameEl, valEl, del);
  return div;
}

function renderAll() {
  const iList = document.getElementById('income-list');
  const eList = document.getElementById('expense-list');
  iList.innerHTML = ''; eList.innerHTML = '';
  state.income.forEach(r => iList.appendChild(buildRow(r,'income')));
  state.expense.forEach(r => eList.appendChild(buildRow(r,'expense')));
}

function addItem(kind) {
  const item = { id: uid(), name: kind==='income' ? 'Nova receita' : 'Nova despesa', val: 0, on: false };
  state[kind].push(item);
  const listEl = document.getElementById(kind==='income' ? 'income-list' : 'expense-list');
  const row = buildRow(item, kind);
  listEl.appendChild(row);
  setTimeout(() => row.querySelector('.row-name').focus(), 50);
  update();
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function exportCSV() {
  const rows = ['tipo,nome,valor,activo'];
  state.income.forEach(r => rows.push(`receita,"${r.name}",${r.val.toFixed(2)},${r.on}`));
  state.expense.forEach(r => rows.push(`despesa,"${r.name}",${r.val.toFixed(2)},${r.on}`));
  const blob = new Blob([rows.join('\n')], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='financas.csv'; a.click();
  showToast('CSV exportado!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── MONTH LABEL ───────────────────────────────────────────────────────────────
document.getElementById('month-label').textContent =
  new Date().toLocaleDateString('pt-PT', {month:'long', year:'numeric'});

// ── PWA INSTALL ───────────────────────────────────────────────────────────────
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});
document.getElementById('install-btn').addEventListener('click', () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('install-banner').style.display = 'none';
  });
});
window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').style.display = 'none';
  showToast('App instalada!');
});

// ── SERVICE WORKER ────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderAll();
update();
</script>
</body>
</html>
